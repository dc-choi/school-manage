<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="위클리스쿨 심볼">
    <defs>
        <radialGradient id="ws-symbol-halo" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#FBBF24" stop-opacity="0.5" />
            <stop offset="0.55" stop-color="#FBBF24" stop-opacity="0.22" />
            <stop offset="1" stop-color="#FBBF24" stop-opacity="0" />
        </radialGradient>
    </defs>

    <!-- 배경 + 컨테이너 -->
    <rect width="1024" height="1024" fill="#FAFAF9" />
    <rect x="110" y="110" width="804" height="804" rx="110" ry="110"
          fill="#FAFAF9" stroke="#E8DFCC" stroke-width="14" />

    <!-- 큰 amber halo -->
    <circle cx="512" cy="512" r="340" fill="url(#ws-symbol-halo)" />

    <!-- 메인 ◎ — 외곽 굵은 링 + 안쪽 링 + 눈 + 입 -->
    <circle cx="512" cy="512" r="260" fill="#FAFAF9" stroke="#4F46E5" stroke-width="44" />
    <circle cx="512" cy="512" r="180" fill="none" stroke="#4F46E5" stroke-width="18" />
    <circle cx="464" cy="488" r="20" fill="#4F46E5" />
    <circle cx="560" cy="488" r="20" fill="#4F46E5" />
    <path d="M 460 555 Q 512 612 564 555"
          fill="none" stroke="#4F46E5" stroke-width="16" stroke-linecap="round" />
</svg>
