packages:
  - apps/api
  - apps/web
  - packages/shared
  - packages/trpc
  - packages/utils

catalog:
  # Node types
  '@types/node': ^24.10.9
  '@types/express': ^5.0.6
  '@types/express-serve-static-core': ^5.1.1
  '@types/qs': ^6.14.0

  # tRPC (버전 통일 필수)
  '@trpc/server': ^10.45.4
  '@trpc/client': ^10.45.4
  '@trpc/react-query': ^10.45.4
  superjson: ^2.2.1

  # Testing
  vitest: ^4.0.16

  # ESLint
  '@eslint/eslintrc': ^3.3.1
  '@eslint/js': ^9.28.0
  '@typescript-eslint/eslint-plugin': ^8.34.0
  '@typescript-eslint/parser': ^8.34.0
  eslint: ^9.28.0
  eslint-config-prettier: ^10.1.5
  eslint-plugin-prettier: ^5.4.1
  globals: ^16.2.0

  # Prettier
  '@trivago/prettier-plugin-sort-imports': ^5.2.2
  prettier: ^3.7.4

  # TypeScript
  typescript: ^5.8.3

minimumReleaseAge: 1440

overrides:
  # qs Prototype Pollution (express-5-migration) — 6.14.1까지 vulnerable, 6.14.2+ patched
  qs: '>=6.14.2'

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - bcrypt
  - better-sqlite3
  - esbuild
  - prisma
