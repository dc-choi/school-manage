name: CI - Quality Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: school_test
          MYSQL_USER: test
          MYSQL_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USERNAME: test
      MYSQL_PASSWORD: test
      MYSQL_SCHEMA: school_test
      JWT_SECRET: test-secret-key-for-ci
      JWT_EXPIRE_ACCESS: 1h
      JWT_EXPIRE_REFRESH: 7d
      APP_NAME: test
      APP_PORT: 3000
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Create test env file
        run: |
          cat > apps/api/.env.test <<'EOF'
          MYSQL_HOST=127.0.0.1
          MYSQL_PORT=3306
          MYSQL_USERNAME=test
          MYSQL_PASSWORD=test
          MYSQL_SCHEMA=school_test
          APP_NAME=test
          APP_PORT=3000
          JWT_SECRET=test-secret-key-for-ci
          JWT_EXPIRE_ACCESS=1h
          JWT_EXPIRE_REFRESH=7d
          EOF

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Prettier
        run: pnpm prettier

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
